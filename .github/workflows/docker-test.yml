name: Django TODO Test

on:
  push:
    branches: [ "test" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup Docker Compose
      run: docker compose up -d
    - name: Run tests
      run: docker compose exec backend sh -c "flake8 && pytest ."
